name: Deploy Fuyu RAG to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Login en Azure usando tu Service Principal
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Login en el Registro (ACR) extrayendo datos del JSON de Azure
      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ca19777e4b99acr.azurecr.io
          username: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          password: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}

      # 3. Construcción y subida de la imagen de Docker
      - name: Build and push image
        run: |
          docker build . -t ca19777e4b99acr.azurecr.io/fuyu-tutor:latest
          docker push ca19777e4b99acr.azurecr.io/fuyu-tutor:latest

      # 4. Despliegue en la Container App
      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: fuyu-tutor-wladimir
          resourceGroup: rg-fuyu-mlops
          imageToDeploy: ca19777e4b99acr.azurecr.io/fuyu-tutor:latest
          registryUrl: ca19777e4b99acr.azurecr.io
          registryUsername: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          registryPassword: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          targetPort: 8000
          ingress: external
          # Inyectamos variables temporales para evitar que el contenedor crashee al inicio
          envVars: |
            AZURE_OPENAI_API_KEY=placeholder
            AZURE_OPENAI_ENDPOINT=https://placeholder.openai.azure.com/