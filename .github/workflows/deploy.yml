name: Deploy Fuyu RAG to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Login en Azure (Para comandos az)
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Login en ACR usando la Acción oficial (Evita errores de TTY)
      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ca19777e4b99acr.azurecr.io
          # Usamos tu Service Principal que ya tiene permisos AcrPush/AcrPull
          username: 33befc6c-8a94-4fed-8ab3-976f25fc5868
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. Build y Push
      - name: Build and push image
        run: |
          docker build . -t ca19777e4b99acr.azurecr.io/fuyu-tutor:latest
          docker push ca19777e4b99acr.azurecr.io/fuyu-tutor:latest

      # 4. Despliegue en Container App
      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: fuyu-tutor-wladimir
          resourceGroup: rg-fuyu-mlops
          imageToDeploy: ca19777e4b99acr.azurecr.io/fuyu-tutor:latest
          registryUrl: ca19777e4b99acr.azurecr.io
          registryUsername: 33befc6c-8a94-4fed-8ab3-976f25fc5868
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 8000
          ingress: external