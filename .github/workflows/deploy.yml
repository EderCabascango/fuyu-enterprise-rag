name: Deploy Fuyu RAG to Azure

on:
  push:
    branches: [ "main" ] # Se activa al hacer push a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Loguearse en Azure con el Service Principal
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Loguearse en el ACR y subir la imagen de Docker
      - name: Build and push image to ACR
        run: |
          az acr login --name ca19777e4b99acr
          docker build . -t ca19777e4b99acr.azurecr.io/fuyu-tutor:latest
          docker push ca19777e4b99acr.azurecr.io/fuyu-tutor:latest

      # 3. Desplegar en la Container App usando las credenciales del registro
      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: fuyu-tutor-wladimir
          resourceGroup: rg-fuyu-mlops
          imageToDeploy: ca19777e4b99acr.azurecr.io/fuyu-tutor:latest
          # Aquí es donde inyectamos las llaves que configuramos en los secrets
          registryUrl: ca19777e4b99acr.azurecr.io
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          # Puerto de salida (Chainlit usa el 8000 por defecto)
          targetPort: 8000
          ingress: external